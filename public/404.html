<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieVerse — Loading Page...</title>
  <style>
    body {
      background-color: #0b0c10;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(245, 197, 24, 0.2);
      border-top-color: #f5c518;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 { font-size: 1.25rem; font-weight: 700; margin: 0 0 8px 0; }
    p { font-size: 0.875rem; color: #9ca3af; margin: 0; }
  </style>
  <script>
    (function () {
      var path = window.location.pathname;
      var basePath = "/portfolio/movieverse";
      
      // If path starts with /portfolio/movieverse, strip basePath to get clean route
      var relativePath = path;
      if (path.indexOf(basePath) === 0) {
        relativePath = path.slice(basePath.length);
      }
      
      // Redirect to root with target path parameter
      var targetUrl = basePath + "/?p=" + encodeURIComponent(relativePath) + (window.location.search ? "&" + window.location.search.slice(1) : "") + window.location.hash;
      window.location.replace(targetUrl);
    })();
  </script>
</head>
<body>
  <div class="spinner"></div>
  <h2>Loading MovieVerse...</h2>
  <p>Connecting to movie database</p>
</body>
</html>
